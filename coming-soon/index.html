<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Soaring — Site em construção</title>
<meta name="description" content="Happy Soaring — parapente e parakite em Portugal. Novo site brevemente." />
<style>
  :root{ --orange:#ff6a13; --black:#141414; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    color:#fff;overflow:hidden;
  }
  .stage{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden}

  .bg{position:absolute;inset:0;z-index:-1;overflow:hidden}
  .bg img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    filter:grayscale(1) contrast(1.05) brightness(1.05);
  }
  .bg img.mobile{display:none}
  .bg-tint{
    position:absolute;inset:0;mix-blend-mode:color;
    background:linear-gradient(180deg,#0a3d7a 0%,#1f6fc0 100%);
  }
  .scrim{
    position:absolute;inset:0;
    background:
      linear-gradient(90deg,rgba(9,40,82,.7) 0%,rgba(9,40,82,.35) 40%,rgba(9,40,82,.1) 62%,transparent 78%),
      linear-gradient(180deg,transparent 0%,transparent 45%,rgba(9,40,82,.5) 72%,rgba(9,40,82,.78) 100%);
  }

  .content{position:relative;z-index:2;max-width:640px;padding:8vh 7vw}
  .kicker{
    display:inline-block;font-size:13px;letter-spacing:3px;text-transform:uppercase;font-weight:700;
    background:rgba(9,40,82,.55);border:1px solid rgba(255,255,255,.3);
    padding:8px 16px;border-radius:100px;margin-bottom:22px;backdrop-filter:blur(6px);
  }
  h1{
    font-size:clamp(44px,9vw,96px);font-weight:900;letter-spacing:-2px;line-height:.92;
    text-shadow:0 4px 24px rgba(0,0,0,.4);
  }
  h1 span{color:var(--orange)}
  .msg{
    margin-top:22px;font-size:clamp(18px,2.4vw,24px);font-weight:600;
    text-shadow:0 2px 10px rgba(0,0,0,.4);
  }
  .msg small{display:block;font-size:.7em;font-weight:400;opacity:.85;margin-top:4px}

  .badge{
    display:inline-flex;align-items:center;gap:16px;margin-top:32px;
    background:rgba(9,40,82,.72);backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.35);border-radius:14px;padding:12px 20px;
    box-shadow:0 8px 24px rgba(0,0,0,.25);font-size:13px;
  }
  .badge img{height:40px;width:auto;display:block}
  .badge span{border-left:1px solid rgba(255,255,255,.3);padding-left:16px;line-height:1.3}

  footer{
    position:absolute;bottom:24px;left:0;right:0;z-index:2;
    text-align:center;font-size:12px;letter-spacing:.5px;opacity:.75;
  }

  @media(max-width:760px){
    .bg img.desktop{display:none}
    .bg img.mobile{display:block}
    .content{padding-bottom:14vh}
  }
</style>
</head>
<body>
<section class="stage">
  <div class="bg">
    <img class="desktop" src="images/hero-bg.jpg" alt="" />
    <img class="mobile" src="images/hero-bg-mobile.jpg" alt="" />
    <div class="bg-tint"></div>
  </div>
  <div class="scrim"></div>

  <div class="content">
    <span class="kicker">Parakite · Portugal</span>
    <h1>HAPPY<br><span>SOARING</span></h1>
    <p class="msg">
      Site em construção.
      <small>New site coming soon.</small>
    </p>
    <div class="badge">
      <img src="images/flow-logo.png" alt="Flow Paragliders" />
      <span>Dealer<br>Oficial</span>
    </div>
  </div>

  <footer>© 2026 Happy Soaring</footer>
</section>
</body>
</html>
